[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
    nrf24/RF24@^1.4.11

[env:esp32-c3-devkitm-1]
board = esp32-c3-devkitm-1

[env:lolin32-lite]
board = lolin32_lite
build_flags =
    -DNRF_CE_PIN=17
    -DNRF_CSN_PIN=5
    -DNRF_SCK_PIN=18
    -DNRF_MISO_PIN=19
    -DNRF_MOSI_PIN=23
